name: Type checking

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/typecheck.yml"
      - "pyproject.toml"
      - "**/*.py"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/typecheck.yml"
      - "pyproject.toml"
      - "**/*.py"
jobs:
  mypy:
    name: mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install . --group typecheck

      - name: Run mypy
        run: |
          mypy src/licenseid --ignore-missing-imports --no-strict-optional
        continue-on-error: true
