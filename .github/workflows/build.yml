name: Build wheels

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/build.yml"
      - "pyproject.toml"
      - "src/**.py"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/build.yml"
      - "pyproject.toml"
      - "src/**.py"

jobs:
  build-wheel:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.11", "3.14" ]
      fail-fast: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          pip install --upgrade build pip
          pip install .

      - name: Build wheel
        id: build
        run: |
          python -m build
